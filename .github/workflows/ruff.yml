name: Ruff
on: [ push, pull_request ]
concurrency:
  group: ruff-${{ github.ref }}
  cancel-in-progress: true
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check backend --output-format=github